 ui-monospace, 'Courier New', monospace;\n  --font-sans: 'Space Mono', ui-monospace, 'Courier New', monospace;\n  --font-display: 'Space Mono', ui-monospace, 'Courier New', monospace;\n\n  --max-w: 1200px;\n  --col-w: 680px;\n}\n\nhtml { scroll-behavior: smooth; scroll-padding-top: 80px; }\n\nbody {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  color: var(--forest);\n  background: var(--bone);\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* === UTILS === */\n.mono {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n}\n.wrap {\n  max-width: var(--max-w);\n  margin: 0 auto;\n  padding: 0 2rem;\n}\n.col {\n  max-width: var(--col-w);\n  margin: 0 auto;\n}\n\n/* === NAV === */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: var(--bone);\n  border-bottom: 0.5px solid var(--forest-15);\n  backdrop-filter: blur(8px);\n  background: rgba(238,230,214,0.92);\n}\n.nav-inner {\n  max-width: var(--max-w);\n  margin: 0 auto;\n  padding: 1.1rem 2rem;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 2rem;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 0.75rem;\n  text-decoration: none;\n  color: var(--forest);\n}\n.brand svg { width: 32px; height: 32px; flex-shrink: 0; }\n.brand-name {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 0.95rem;\n  letter-spacing: -0.01em;\n}\n.brand-name .dot { color: var(--clay); }\n.nav-meta {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  opacity: 0.6;\n}\n@media (max-width: 640px) {\n  .nav-meta { display: none; }\n}\n\n/* === HERO === */\n.hero {\n  background: var(--forest);\n  color: var(--bone);\n  padding: 5rem 0 6rem;\n  position: relative;\n  overflow: hidden;\n}\n.hero-meta {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  opacity: 0.7;\n  margin-bottom: 4rem;\n}\n.hero-mark {\n  display: flex;\n  justify-content: center;\n  margin-bottom: 3rem;\n}\n.hero-mark svg { width: 130px; height: 104px; }\n.hero-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 0.75rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 1.5rem;\n  text-align: center;\n}\n.hero-title {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: clamp(2.5rem, 6vw, 4.5rem);\n  line-height: 1.02;\n  letter-spacing: -0.02em;\n  text-align: center;\n  max-width: 920px;\n  margin: 0 auto 1.5rem;\n}\n.hero-lede {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  font-size: clamp(1rem, 1.6vw, 1.2rem);\n  line-height: 1.55;\n  text-align: center;\n  max-width: 660px;\n  margin: 0 auto;\n  opacity: 0.88;\n}\n.hero-byline {\n  margin-top: 3rem;\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  opacity: 0.6;\n}\n\n/* === SECTION === */\nsection {\n  padding: 6rem 0;\n  position: relative;\n}\n.section-bone { background: var(--bone); color: var(--forest); }\n.section-forest { background: var(--forest); color: var(--bone); }\n.section-rust { background: var(--rust); color: var(--bone); }\n.section-clay { background: var(--clay); color: var(--forest); }\n\n.section-tag {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 1.5rem;\n  display: block;\n}\n.section-rust .section-tag,\n.section-forest .section-tag { color: var(--clay); }\n\n.section-title {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: clamp(2rem, 4.5vw, 3.25rem);\n  line-height: 1.05;\n  letter-spacing: -0.015em;\n  margin-bottom: 2rem;\n}\n.section-intro {\n  font-family: var(--font-sans);\n  font-size: 1.2rem;\n  line-height: 1.55;\n  font-weight: 300;\n  margin-bottom: 3rem;\n  max-width: 620px;\n  opacity: 0.88;\n}\n\n/* === BODY TEXT === */\np.body {\n  font-family: var(--font-sans);\n  font-size: 1.05rem;\n  line-height: 1.7;\n  margin-bottom: 1.25rem;\n  max-width: var(--col-w);\n}\n.section-rust p.body, .section-forest p.body { opacity: 0.92; }\n\nem.it { font-style: italic; font-family: var(--font-display); }\n.b { font-weight: 500; }\n\n/* === STATS === */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 2rem 3rem;\n  margin: 3rem 0;\n}\n.stat {\n  border-top: 1.5px solid currentColor;\n  padding-top: 1rem;\n}\n.stat-num {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: clamp(2.6rem, 5vw, 3.4rem);\n  line-height: 1;\n  letter-spacing: -0.02em;\n  margin-bottom: 0.6rem;\n}\n.stat-unit {\n  font-size: 0.55em;\n  opacity: 0.65;\n  margin-left: 0.1em;\n}\n.stat-label {\n  font-family: var(--font-sans);\n  font-size: 0.92rem;\n  line-height: 1.45;\n  opacity: 0.78;\n}\n\n/* === PULL QUOTE === */\nblockquote.pull {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: clamp(1.4rem, 2.6vw, 1.85rem);\n  line-height: 1.35;\n  margin: 3rem 0 2rem;\n  padding-left: 2rem;\n  border-left: 3px solid var(--clay);\n  max-width: 760px;\n}\nblockquote.pull cite {\n  display: block;\n  font-family: var(--font-mono);\n  font-style: normal;\n  font-size: 0.7rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  opacity: 0.6;\n  margin-top: 1.2rem;\n}\n\n/* === TRAJECTORY DIAGRAM === */\n.traj-axis {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  align-items: center;\n  margin: 2.5rem 0 1.5rem;\n  position: relative;\n}\n.traj-axis::before {\n  content: '';\n  position: absolute;\n  left: 4%;\n  right: 4%;\n  top: 50%;\n  height: 1px;\n  background: currentColor;\n  opacity: 0.25;\n}\n.traj-dot {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 0.6rem;\n  z-index: 1;\n}\n.traj-dot-circle {\n  width: 14px; height: 14px;\n  background: var(--forest);\n  border-radius: 50%;\n}\n.traj-dot:nth-child(2) .traj-dot-circle {\n  width: 18px; height: 18px;\n  background: var(--clay);\n}\n.traj-dot:nth-child(3) .traj-dot-circle {\n  width: 22px; height: 22px;\n  background: var(--rust);\n}\n.traj-dot:first-child { align-items: flex-start; }\n.traj-dot:last-child { align-items: flex-end; }\n.traj-dot:first-child .traj-dot-circle { margin-left: 0; }\n.traj-dot:last-child .traj-dot-circle { margin-right: 0; }\n.traj-label {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  opacity: 0.65;\n}\n\n.traj-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 1.25rem;\n  margin-top: 2rem;\n}\n@media (max-width: 760px) {\n  .traj-grid { grid-template-columns: 1fr; }\n  .traj-axis { display: none; }\n}\n.traj-stage {\n  background: var(--bone);\n  border-radius: 12px;\n  padding: 1.75rem 1.5rem;\n  position: relative;\n}\n.traj-stage.s1 { background: var(--forest-04); }\n.traj-stage.s2 { background: rgba(217,107,61,0.16); }\n.traj-stage.s3 { background: rgba(138,47,29,0.2); }\n.traj-stage-num {\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  opacity: 0.55;\n  margin-bottom: 0.75rem;\n}\n.traj-stage h3 {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 1.55rem;\n  line-height: 1.1;\n  margin-bottom: 1.25rem;\n}\n.traj-stage ul { list-style: none; }\n.traj-stage li {\n  padding: 0.6rem 0;\n  border-top: 0.5px solid var(--forest-15);\n  font-family: var(--font-sans);\n  font-size: 0.88rem;\n  line-height: 1.4;\n}\n.traj-stage li:first-child { border-top: none; }\n.traj-stage li strong {\n  display: block;\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 0.6rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  opacity: 0.6;\n  margin-bottom: 0.2rem;\n}\n\n.callout {\n  background: var(--forest);\n  color: var(--bone);\n  padding: 1.75rem 2rem;\n  border-radius: 10px;\n  margin-top: 2rem;\n}\n.callout-label {\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 0.75rem;\n}\n.callout p {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 1.25rem;\n  line-height: 1.4;\n}\n\n/* === SEVEN PROPERTIES === */\n.props {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 1rem;\n  margin-top: 2.5rem;\n}\n.prop {\n  background: var(--forest-04);\n  border-radius: 10px;\n  padding: 1.5rem 1.4rem;\n  border-left: 3px solid var(--clay);\n}\n.prop-num {\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  opacity: 0.5;\n  margin-bottom: 0.5rem;\n}\n.prop h4 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: 1.1rem;\n  line-height: 1.2;\n  margin-bottom: 0.5rem;\n}\n.prop p {\n  font-size: 0.92rem;\n  line-height: 1.5;\n  opacity: 0.78;\n}\n\n/* === FOUR FORCES === */\n.forces { margin-top: 2.5rem; }\n.force {\n  display: grid;\n  grid-template-columns: 60px 1fr;\n  gap: 1.25rem;\n  padding: 1.75rem 0;\n  border-top: 0.5px solid var(--forest-15);\n  align-items: start;\n}\n.force:last-child { border-bottom: 0.5px solid var(--forest-15); }\n.force-num {\n  font-family: var(--font-mono);\n  font-size: 0.95rem;\n  font-weight: 700;\n  letter-spacing: 0.05em;\n  opacity: 0.5;\n  padding-top: 0.25rem;\n}\n.force h3 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: 1.4rem;\n  line-height: 1.2;\n  margin-bottom: 0.6rem;\n}\n.force p {\n  font-size: 1rem;\n  line-height: 1.6;\n  opacity: 0.85;\n}\n\n/* === FOUR DIMENSIONS === */\n.dims {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));\n  gap: 1.25rem;\n  margin-top: 2.5rem;\n}\n.dim {\n  background: var(--forest-04);\n  border-radius: 12px;\n  padding: 1.75rem 1.6rem;\n  border-left: 3px solid var(--clay);\n}\n.dim-num {\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  opacity: 0.55;\n  margin-bottom: 0.6rem;\n}\n.dim h3 {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 1.5rem;\n  line-height: 1.15;\n  margin-bottom: 0.85rem;\n}\n.dim > p {\n  font-family: var(--font-sans);\n  font-size: 0.95rem;\n  line-height: 1.55;\n  opacity: 0.85;\n  margin-bottom: 1rem;\n}\n.dim-voice {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 1rem;\n  line-height: 1.4;\n  padding-top: 1rem;\n  border-top: 0.5px solid var(--forest-15);\n}\n.dim-source {\n  display: block;\n  font-family: var(--font-mono);\n  font-style: normal;\n  font-size: 0.6rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  opacity: 0.6;\n  margin-top: 0.6rem;\n}\n\n/* === RUST SECTION SYNTHESIS BOX === */\n.synthesis {\n  background: rgba(238,230,214,0.12);\n  border-left: 3px solid var(--clay);\n  border-radius: 0 10px 10px 0;\n  padding: 1.75rem 2rem;\n  margin: 2.5rem 0;\n}\n.synthesis-label {\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 0.75rem;\n}\n.synthesis p {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 1.35rem;\n  line-height: 1.35;\n}\n\n/* === RECOMMENDATIONS TABLE === */\n.recs { margin-top: 2.5rem; }\n.rec {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 2rem;\n  padding: 1.5rem 0;\n  border-top: 0.5px solid var(--forest-15);\n  align-items: start;\n}\n.rec:last-child { border-bottom: 0.5px solid var(--forest-15); }\n@media (max-width: 760px) {\n  .rec { grid-template-columns: 1fr; gap: 1rem; padding: 1.5rem 0; }\n}\n.rec-col-label {\n  font-family: var(--font-mono);\n  font-size: 0.6rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  opacity: 0.55;\n  margin-bottom: 0.5rem;\n  display: block;\n}\n.rec-problem {\n  font-size: 0.98rem;\n  line-height: 1.55;\n  opacity: 0.78;\n}\n.rec-response {\n  font-size: 0.98rem;\n  line-height: 1.55;\n  font-weight: 500;\n  color: var(--rust);\n}\n\n/* === SIGNALS === */\n.signals { margin-top: 2.5rem; }\n.signal {\n  display: grid;\n  grid-template-columns: 50px 1fr;\n  gap: 1rem;\n  padding: 1.25rem 0;\n  border-top: 0.5px solid var(--forest-15);\n  align-items: baseline;\n}\n.signal:last-child { border-bottom: 0.5px solid var(--forest-15); }\n.signal-num {\n  font-family: var(--font-mono);\n  font-size: 0.78rem;\n  letter-spacing: 0.14em;\n  opacity: 0.5;\n}\n.signal-text {\n  font-family: var(--font-sans);\n  font-size: 1.05rem;\n  line-height: 1.5;\n}\n.signal-text strong { font-weight: 500; }\n\n/* === CLOSING === */\n.closing {\n  text-align: left;\n}\n.closing-quote {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: clamp(2rem, 5vw, 3.4rem);\n  line-height: 1.15;\n  margin-bottom: 2rem;\n  max-width: 880px;\n}\n.closing-source {\n  font-family: var(--font-mono);\n  font-size: 0.75rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  opacity: 0.7;\n}\n\n/* === FOOTER === */\n.footer {\n  background: var(--forest);\n  color: var(--bone);\n  padding: 4rem 0 3rem;\n}\n.footer-grid {\n  display: grid;\n  grid-template-columns: 1fr 1.5fr;\n  gap: 4rem;\n  align-items: start;\n}\n@media (max-width: 760px) {\n  .footer-grid { grid-template-columns: 1fr; gap: 2.5rem; }\n}\n.footer-brand .brand-name { font-size: 1.1rem; }\n.footer-tagline {\n  font-family: var(--font-sans);\n  font-size: 0.88rem;\n  line-height: 1.55;\n  opacity: 0.75;\n  margin-top: 1.25rem;\n  max-width: 280px;\n}\n.footer-tagline .b { font-weight: 500; }\n.footer-ref-label {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 1rem;\n}\n.footer-ref {\n  font-family: var(--font-sans);\n  font-size: 0.92rem;\n  line-height: 1.6;\n  opacity: 0.82;\n}\n.footer-ref em { font-style: italic; }\n.footer-ref a {\n  color: var(--clay);\n  text-decoration: none;\n  border-bottom: 0.5px solid var(--clay);\n}\n.footer-ref a:hover { opacity: 0.8; }\n.footer-bottom {\n  margin-top: 3rem;\n  padding-top: 1.75rem;\n  border-top: 0.5px solid var(--bone-15);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--font-mono);\n  font-size: 0.65rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  opacity: 0.55;\n}\n@media (max-width: 540px) {\n  .footer-bottom { flex-direction: column; gap: 1rem; align-items: flex-start; }\n}\n\n/* === BACK-TO-TOP === */\n.totop {\n  position: fixed;\n  bottom: 2rem;\n  right: 2rem;\n  width: 44px;\n  height: 44px;\n  border-radius: 50%;\n  background: var(--forest);\n  color: var(--bone);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-decoration: none;\n  font-family: var(--font-mono);\n  font-size: 0.85rem;\n  opacity: 0;\n  transition: opacity 0.25s ease;\n  pointer-events: none;\n  z-index: 40;\n  box-shadow: 0 4px 14px rgba(0,0,0,0.18);\n}\n.totop.visible {\n  opacity: 1;\n  pointer-events: auto;\n}\n.totop:hover { background: var(--clay); }\n\n/* === READING PROGRESS BAR === */\n.progress {\n  position: fixed;\n  top: 0;\n  left: 0;\n  height: 2px;\n  width: 0;\n  background: var(--clay);\n  z-index: 100;\n  transition: width 0.05s linear;\n}\n\n/* === APPENDIX / TEMPLATE === */\n.bloco {\n  margin-top: 4.5rem;\n  padding-top: 2.5rem;\n  border-top: 0.5px solid var(--forest-15);\n}\n.bloco:first-of-type { margin-top: 3rem; border-top: 0; padding-top: 0; }\n.bloco-label {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 1rem;\n  display: block;\n}\n.bloco-title {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-style: italic;\n  font-size: clamp(1.6rem, 3vw, 2.25rem);\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  margin-bottom: 1.5rem;\n  max-width: var(--col-w);\n}\n\nblockquote.entrada {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: clamp(1.4rem, 2.6vw, 1.95rem);\n  line-height: 1.35;\n  margin: 1.5rem 0 1rem;\n  padding: 1.75rem 2rem;\n  background: rgba(217,107,61,0.12);\n  border-left: 3px solid var(--clay);\n  border-radius: 0 10px 10px 0;\n  max-width: 820px;\n}\n\n.bio-card {\n  background: var(--forest-04);\n  border-radius: 10px;\n  padding: 2rem 2.25rem;\n  margin-top: 1.5rem;\n  max-width: var(--col-w);\n  border-left: 3px solid var(--clay);\n}\n.bio-card p.body { margin-bottom: 1rem; }\n.bio-card p.body:last-child { margin-bottom: 0; }\n\n.imagery {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 1.5rem;\n  margin: 1.5rem 0;\n}\n@media (max-width: 640px) { .imagery { grid-template-columns: 1fr; } }\n.imagery-card {\n  background: var(--forest-04);\n  border-radius: 10px;\n  padding: 1.5rem 1.5rem;\n  border-left: 3px solid var(--clay);\n}\n.imagery-card .rec-col-label { margin-bottom: 0.4rem; }\n.imagery-card p {\n  font-family: var(--font-mono);\n  font-size: 0.92rem;\n  line-height: 1.55;\n  opacity: 0.82;\n}\n\n.qa { margin-top: 1.5rem; }\n.qa-item {\n  padding: 2rem 0;\n  border-top: 0.5px solid var(--forest-15);\n}\n.qa-item:last-child { border-bottom: 0.5px solid var(--forest-15); }\n.qa-q-label {\n  font-family: var(--font-mono);\n  font-size: 0.6rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  opacity: 0.55;\n  margin-bottom: 0.6rem;\n  display: block;\n}\n.qa-q {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 1.1rem;\n  line-height: 1.4;\n  margin-bottom: 1.25rem;\n  max-width: var(--col-w);\n}\n.qa-a {\n  font-family: var(--font-mono);\n  font-size: 0.95rem;\n  line-height: 1.7;\n  max-width: var(--col-w);\n  margin-bottom: 1rem;\n}\n.qa-a:last-child { margin-bottom: 0; }\n\n.linklist {\n  list-style: none;\n  margin-top: 1.5rem;\n  padding: 0;\n}\n.linklist li {\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 1.25rem;\n  align-items: baseline;\n  padding: 1.5rem 0;\n  border-top: 0.5px solid var(--forest-15);\n}\n.linklist li:last-child { border-bottom: 0.5px solid var(--forest-15); }\n.linklist-num {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.16em;\n  opacity: 0.5;\n}\n.linklist-body {\n  font-family: var(--font-mono);\n  font-size: 0.95rem;\n  line-height: 1.6;\n  max-width: var(--col-w);\n}\n.linklist-body em { font-style: italic; font-weight: 700; }\n.linklist-body .pub {\n  display: block;\n  font-size: 0.7rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  opacity: 0.6;\n  margin-top: 0.4rem;\n}\n\n.tpl-cover {\n  text-align: center;\n  padding: 3rem 0 1rem;\n  border-bottom: 0.5px solid var(--bone-15);\n  margin-bottom: 3rem;\n}\n.tpl-cover-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--clay);\n  margin-bottom: 1.25rem;\n}\n.tpl-cover-title {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: clamp(1.4rem, 3vw, 1.85rem);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  margin-bottom: 1.5rem;\n}\n.tpl-cover-ref {\n  font-family: var(--font-mono);\n  font-style: italic;\n  font-size: 0.95rem;\n  line-height: 1.55;\n  opacity: 0.85;\n  max-width: 640px;\n  margin: 0 auto;\n}\n\n/* === RESPONSIVE TWEAKS === */\n@media (max-width: 640px) {\n  .wrap { padding: 0 1.25rem; }\n  section { padding: 4rem 0; }\n  .hero { padding: 3rem 0 4rem; }\n  .stats { gap: 1.5rem; }\n  blockquote.pull { padding-left: 1.25rem; margin: 2rem 0; }\n  .force { grid-template-columns: 1fr; gap: 0.5rem; padding: 1.25rem 0; }\n  .signal { grid-template-columns: 40px 1fr; padding: 1rem 0; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- === PROGRESS BAR === -->\n<div class=\"progress\" id=\"progress\"><\u002Fdiv>\n\n<!-- === NAV === -->\n<nav class=\"nav\">\n  <div class=\"nav-inner\" style=\"justify-content: space-between\">\n    <a href=\"#top\" class=\"brand\">\n      <svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"50\" cy=\"50\" r=\"28\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><\u002Fcircle>\n        <circle cx=\"56\" cy=\"42\" r=\"6\" fill=\"#D96B3D\"><\u002Fcircle>\n        <path d=\"M 14 64 C 30 63, 50 65, 86 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n      <span class=\"brand-name\">observatório<span class=\"dot\">.<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <span class=\"nav-meta\" style=\"font-size: 10.2px; font-family: &quot;Space Mono&quot;\">CIÊNCIAS COMPORTAMENTAIS APLICADAS À INCLUSÃO, EDUCAÇÃO E PLANEJAMENTO FINANCEIRO NO SUL GLOBAL<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- === HERO === -->\n<header class=\"hero\" id=\"top\" style=\"background-color: rgb(26, 36, 25)\">\n  <div class=\"wrap\" style=\"font-family: ui-monospace\">\n    <div class=\"hero-meta\">\n      <span style=\"padding: 0px 0px 0px 30px\">PESQUISA CIENTÍFICA:\nFROM ORDER TO CHAOS:&nbsp;HOW CONSUMERS&nbsp;LOSE\nCONTROL OF RISKS (AND OF THEMSELVES)<\u002Fspan>\n      <span style=\"text-align: right; padding: 0px 30px 0px 0px\">PESQUISADOR:\nJULIO C. LEANDRO\nDELANE BOTELHO<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"hero-eyebrow\"><\u002Fdiv>\n    <h1 class=\"hero-title\" style=\"font-family: &quot;Space Mono&quot;; font-weight: 600; font-size: 32.4px; width: 620px\">O problema do superendividamento não é apenas a dívida, pode ser a perda progressiva de controle sobre a própria vida.<\u002Fh1>\n    <p class=\"hero-lede\" style=\"color: rgb(217, 107, 61); font-weight: 600\">\n      O que a pesquisa sobre consumidores que perderam o controle de suas\n      dívidas nos ensina sobre como desenhar programas de inclusão, educação\n      e planejamento financeiro que funcionam.\n    <\u002Fp>\n\n    <div class=\"hero-byline\">\n      Leitura · 11 min · 8 seções\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- === SECTION 01 — POR QUE ISSO IMPORTA === -->\n<section class=\"section-bone\" id=\"abertura\" style=\"height: 370.461px\">\n  <div class=\"wrap\" style=\"padding: 0px 32px; border-width: 0px 0px 1px; border-style: solid\">\n    <div class=\"col\" style=\"margin: 0px 48px\">\n      <span class=\"section-tag\" style=\"font-size: 31.2px; margin: 0px 0px 24px; width: 880px; text-align: left; text-transform: lowercase; font-weight: 600; letter-spacing: 3.24px\">observatório&nbsp;como ponte:<\u002Fspan>\n      <h2 class=\"section-title\">\n<\u002Fh2>\n      <p class=\"section-intro\">\n<\u002Fp>\n\n      <p class=\"body\">\n<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"col\">\n      <div class=\"stats\">\n        <div class=\"stat\" style=\"border-width: 0px\">\n          <div class=\"stat-num\">\n<\u002Fdiv>\n          <div class=\"stat-label\" style=\"width: 316px; font-family: &quot;DM Sans&quot;\">Nós acreditamos que pra quem desenha programas de inclusão, isso muda.&nbsp;Não é mais&nbsp;\"como ensinamos a tomar decisões melhores\", e sim&nbsp;\"como sustentamos quem está perdendo a capacidade de decidir\".<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\" style=\"border-width: 0px\">\n          <div class=\"stat-num\">\n<\u002Fdiv>\n          <div class=\"stat-label\" style=\"width: 316px; font-family: &quot;DM Sans&quot;\">Para quem desenha programas de inclusão, isso muda.&nbsp;Não é mais&nbsp;\"como ensinamos a tomar decisões melhores\", e sim&nbsp;\"como sustentamos quem está perdendo a capacidade de decidir\".<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\" style=\"border-width: 0px\">\n          <div class=\"stat-num\">\n<\u002Fdiv>\n          <div class=\"stat-label\">\n<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\" style=\"border-width: 0px\">\n          <div class=\"stat-num\">\n<\u002Fdiv>\n          <div class=\"stat-label\">\n<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"col\">\n      <p class=\"body\" style=\"margin-top:2rem;\">\n<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 01 — POR QUE ISSO IMPORTA (DUPLICADA) === -->\n<section class=\"section-bone\" id=\"abertura-2\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">01 · Abertura<\u002Fspan>\n      <h2 class=\"section-title\" style=\"font-weight: 600\">O esforço individual não basta.<\u002Fh2>\n      <p class=\"section-intro\" style=\"font-family: &quot;DM Sans&quot;; font-weight: 500\">\n        Programas de educação financeira partem, quase sempre, do mesmo\n        pressuposto: se o consumidor for melhor informado, conseguirá tomar\n        decisões melhores. A pesquisa que este briefing traduz mostra que\n        esse pressuposto, sozinho, é insuficiente — e em alguns casos,\n        contraproducente.\n      <\u002Fp>\n\n      <p class=\"body\">\n        Júlio Leandro e Delane Botelho passaram mais de um ano com 37\n        brasileiros superendividados em São Paulo, mapeando como pessoas\n        comuns — aposentados, professores, autônomos, profissionais\n        liberais — saíram de uma vida em ordem para um estado que descrevem\n        como caos. A descoberta central é que dívida não é só um problema\n        financeiro: é uma trajetória que afeta emoção, identidade, saúde\n        mental e a capacidade de fazer escolhas racionais. Quando os\n        pesquisadores pedem que o consumidor <em class=\"it\">\"se controle\"<\u002Fem>,\n        o que pedem já não está disponível.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"col\">\n      <div class=\"stats\">\n        <div class=\"stat\">\n          <div class=\"stat-num\">76,1<span class=\"stat-unit\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-label\">das famílias brasileiras tinham alguma dívida em janeiro de 2025.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"stat-num\">73,5<span class=\"stat-unit\"> mi<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-label\">de brasileiros estavam inadimplentes em dezembro de 2024.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"stat-num\">27,9<span class=\"stat-unit\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-label\">da renda das famílias era usada para pagar dívidas em 2022 — em 2005, eram 18%.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"stat-num\">59,5<span class=\"stat-unit\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-label\">dos entrevistados perderam emprego ou renda como gatilho inicial do problema.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"col\">\n      <p class=\"body\" style=\"margin-top:2rem;\">\n        Para quem desenha programas de inclusão, isso muda a pergunta. Não\n        é mais <em class=\"it\">\"como ensinamos a tomar decisões melhores\"<\u002Fem>,\n        e sim <em class=\"it\">\"como sustentamos quem está perdendo a\n        capacidade de decidir\"<\u002Fem>.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 02 — DESCOBERTA CENTRAL === -->\n<section class=\"section-bone\" id=\"conceito\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">02 · Conceito<\u002Fspan>\n      <h2 class=\"section-title\">Espiral para baixo<br>com riscos que escalam.<\u002Fh2>\n\n      <p class=\"body\">\n        Pesquisas anteriores estudaram pessoas que <em class=\"it\">buscam<\u002Fem>\n        risco deliberadamente — paraquedistas, escaladores, motociclistas —\n        e mostraram que elas treinam, planejam e desenvolvem habilidade\n        para <span style=\"color:var(--rust);font-weight:500;\">controlar o\n        risco<\u002Fspan>. O nome técnico desse fenômeno é\n        <em class=\"it\">edgework<\u002Fem>: trabalhar na beirada do caos sem cair.\n      <\u002Fp>\n\n      <p class=\"body\">\n        O superendividamento é o inverso. As pessoas não buscam o risco:\n        ele cresce ao redor delas, sem aviso, e quando elas percebem, já\n        não conseguem mais negociar a borda. Os autores chamam isso de\n        <strong>spiraling down with escalating risks<\u002Fstrong> — uma descida\n        em espiral acompanhada de riscos que crescem em intensidade.\n      <\u002Fp>\n\n      <blockquote class=\"pull\">\n        \"Imagine um tsunami: você está no meio dele, e tudo está indo para\n        todo lado. E você quer sair, então luta, tenta escapar de um ponto,\n        acaba em outro, tentando sair. Você reza pra acabar. Vai acabar uma\n        hora — e se você sair vivo, ótimo.\"\n        <cite>Luke · pequeno empresário · entrevistado pela pesquisa<\u002Fcite>\n      <\u002Fblockquote>\n\n      <p class=\"body\">\n        Para quem desenha programas de inclusão, isso muda a pergunta. Não\n        é mais <em class=\"it\">\"como ensinamos a tomar decisões melhores\"<\u002Fem>,\n        e sim <em class=\"it\">\"como sustentamos quem está perdendo a\n        capacidade de decidir\"<\u002Fem>.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 03 — SETE PROPRIEDADES === -->\n<section class=\"section-bone\" id=\"anatomia\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">03 · Anatomia do risco<\u002Fspan>\n      <h2 class=\"section-title\">Por que esses riscos escapam ao controle.<\u002Fh2>\n      <p class=\"section-intro\">\n        Os autores caracterizam o risco do superendividamento com sete\n        propriedades. Juntas, elas explicam por que planilhas, orçamentos e\n        boas intenções, sozinhas, não dão conta.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"props\">\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 01<\u002Fdiv>\n        <h4>Complexo<\u002Fh4>\n        <p>Tem muitas causas operando ao mesmo tempo. Não há \"uma\" origem.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 02<\u002Fdiv>\n        <h4>Dinâmico<\u002Fh4>\n        <p>Muda de natureza com o tempo. Um crédito normalizado, socialmente aprovado, transforma-se em dívida estigmatizada.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 03<\u002Fdiv>\n        <h4>Ambíguo<\u002Fh4>\n        <p>Difícil de interpretar objetivamente — depende de leitura subjetiva, do humor, do momento.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 04<\u002Fdiv>\n        <h4>Imprevisível<\u002Fh4>\n        <p>Capacidade de crescer e mudar torna quase impossível estimar com precisão o desfecho ou sua probabilidade.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 05<\u002Fdiv>\n        <h4>Severo<\u002Fh4>\n        <p>Tem potencial real de comprometer bem-estar físico, mental e material da pessoa e da família.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 06<\u002Fdiv>\n        <h4>Metastático<\u002Fh4>\n        <p>Espalha-se para outras áreas da vida — relacionamentos, saúde, trabalho — como uma metástase.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prop\">\n        <div class=\"prop-num\">Propriedade 07<\u002Fdiv>\n        <h4>Psicologicamente próximo<\u002Fh4>\n        <p>Está colado à pessoa que o experimenta. Não dá pra olhar de fora.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 04 — TRAJETÓRIA === -->\n<section class=\"section-bone\" id=\"trajetoria\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">04 · Infográfico<\u002Fspan>\n      <h2 class=\"section-title\">Três estágios entre ordem e caos.<\u002Fh2>\n      <p class=\"section-intro\">\n        A pesquisa identifica três fases pelas quais o consumidor passa.\n        Reconhecer em qual fase alguém está é o primeiro passo prático para\n        qualquer programa de apoio — porque cada fase pede uma resposta\n        diferente.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"traj-axis\" aria-hidden=\"true\">\n      <div class=\"traj-dot\">\n        <div class=\"traj-dot-circle\"><\u002Fdiv>\n        <div class=\"traj-label\">Risco baixo<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"traj-dot\">\n        <div class=\"traj-dot-circle\"><\u002Fdiv>\n        <div class=\"traj-label\">Risco médio<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"traj-dot\">\n        <div class=\"traj-dot-circle\"><\u002Fdiv>\n        <div class=\"traj-label\">Risco alto<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"traj-grid\">\n      <div class=\"traj-stage s1\">\n        <div class=\"traj-stage-num\">01 · Ordem<\u002Fdiv>\n        <h3>Em controle.<\u002Fh3>\n        <ul>\n          <li><strong>Percepção<\u002Fstrong>Tudo está sob controle<\u002Fli>\n          <li><strong>Emoções<\u002Fstrong>Estáveis<\u002Fli>\n          <li><strong>Identidade<\u002Fstrong>Afirmativa e autônoma<\u002Fli>\n          <li><strong>Esforço<\u002Fstrong>Baixo — não há necessidade percebida<\u002Fli>\n          <li><strong>Metáfora<\u002Fstrong>\"Ordem\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"traj-stage s2\">\n        <div class=\"traj-stage-num\">02 · Entremeio<\u002Fdiv>\n        <h3>Algo está saindo do lugar.<\u002Fh3>\n        <ul>\n          <li><strong>Percepção<\u002Fstrong>Sensação de perder o controle<\u002Fli>\n          <li><strong>Emoções<\u002Fstrong>Ansiedade crescente<\u002Fli>\n          <li><strong>Identidade<\u002Fstrong>Enfraquecendo<\u002Fli>\n          <li><strong>Esforço<\u002Fstrong>Alto — várias soluções sem sucesso<\u002Fli>\n          <li><strong>Metáfora<\u002Fstrong>\"Bola de neve\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"traj-stage s3\">\n        <div class=\"traj-stage-num\">03 · Caos<\u002Fdiv>\n        <h3>Sem saída visível.<\u002Fh3>\n        <ul>\n          <li><strong>Percepção<\u002Fstrong>Sentimento crônico de não ter controle<\u002Fli>\n          <li><strong>Emoções<\u002Fstrong>Tempestade de emoções negativas<\u002Fli>\n          <li><strong>Identidade<\u002Fstrong>Diminuída e depreciada<\u002Fli>\n          <li><strong>Esforço<\u002Fstrong>Baixo — paralisia, desistência<\u002Fli>\n          <li><strong>Metáfora<\u002Fstrong>\"Fundo do poço\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">Implicação prática<\u002Fdiv>\n      <p>\n        O programa que funciona na Ordem (educação preventiva) não funciona\n        no Caos. Ali, falta regulação emocional, apoio jurídico e\n        renegociação institucional — não informação.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 05 — QUATRO FORÇAS === -->\n<section class=\"section-bone\" id=\"forcas\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">05 · Mecânica<\u002Fspan>\n      <h2 class=\"section-title\">Quatro forças que aceleram a espiral.<\u002Fh2>\n      <p class=\"section-intro\">\n        Quase ninguém quebra por uma só razão. A pesquisa identifica quatro\n        fatores que, combinados, transformam um problema gerenciável em\n        uma crise. Eles agem juntos, em camadas, e raramente o consumidor\n        percebe enquanto estão acontecendo.\n      <\u002Fp>\n\n      <div class=\"forces\">\n        <div class=\"force\">\n          <div class=\"force-num\">01<\u002Fdiv>\n          <div>\n            <h3>Eventos simultâneos.<\u002Fh3>\n            <p>\n              Um evento pesado raramente vem sozinho. Doença do cônjuge se\n              combina com perda de emprego, que se combina com despesa\n              imprevista com um familiar. A pesquisa mostra que o\n              superendividamento quase sempre tem origem multicausal — e\n              por isso resiste a soluções que tratam só uma causa.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"force\">\n          <div class=\"force-num\">02<\u002Fdiv>\n          <div>\n            <h3>O estigma silencia.<\u002Fh3>\n            <p>\n              Estar com o \"nome sujo\" é vivido como falha moral. O\n              consumidor esconde da família, dos amigos, do gerente do\n              banco. Tenta resolver sozinho — e atrasa, em meses ou anos, o\n              momento de buscar ajuda especializada. Quando finalmente\n              busca, o problema já cresceu várias vezes.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"force\">\n          <div class=\"force-num\">03<\u002Fdiv>\n          <div>\n            <h3>A ilusão de controle.<\u002Fh3>\n            <p>\n              Enquanto for possível trocar uma dívida por outra —\n              refinanciar, pegar empréstimo para pagar empréstimo — o\n              consumidor sente que está administrando. A maioria só percebe\n              que perdeu o controle quando esgotam as opções de crédito.\n              Aí já é tarde.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"force\">\n          <div class=\"force-num\">04<\u002Fdiv>\n          <div>\n            <h3>A negação ativa.<\u002Fh3>\n            <p>\n              Mecanismo psicológico que protege da dor: o consumidor passa\n              a evitar olhar para o problema. Não abre extratos, não atende\n              telefone, não soma o total. A negação não vem de\n              irresponsabilidade — vem de sobrecarga emocional. E é,\n              paradoxalmente, o que torna a situação irrecuperável.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 06 — DIMENSÕES === -->\n<section class=\"section-bone\" id=\"dimensoes\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">06 · Experiência do caos<\u002Fspan>\n      <h2 class=\"section-title\">Como o caos se sente, por dentro.<\u002Fh2>\n      <p class=\"section-intro\">\n        Quando os pesquisadores ouvem as histórias completas, quatro\n        dimensões aparecem em quase todas. Elas não são fases — são camadas\n        que se sobrepõem, e juntas explicam por que a pessoa não consegue\n        simplesmente \"tomar uma atitude\".\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"dims\">\n      <div class=\"dim\">\n        <div class=\"dim-num\">Dimensão 01<\u002Fdiv>\n        <h3>Espancamento emocional.<\u002Fh3>\n        <p>\n          Vergonha, culpa, medo, raiva, insônia, ataques de pânico, ideação\n          suicida. Associações sistemáticas entre endividamento, depressão\n          e ansiedade.\n        <\u002Fp>\n        <div class=\"dim-voice\">\n          \"Eu já pensei até em me matar. Eu me sentia desesperada na minha\n          casa, quebrei muitas coisas de desespero.\"\n          <span class=\"dim-source\">Angela · enfermeira desempregada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"dim\">\n        <div class=\"dim-num\">Dimensão 02<\u002Fdiv>\n        <h3>O desmoronar do mundo.<\u002Fh3>\n        <p>\n          O problema vaza para todas as áreas: família, saúde, trabalho,\n          amizades. A vida que era inteira passa a ser organizada em torno\n          da dívida — e tudo o mais murcha.\n        <\u002Fp>\n        <div class=\"dim-voice\">\n          \"Eu fui ficando pior, pior, pior, até o momento em que me\n          encontrei no fundo do poço.\"\n          <span class=\"dim-source\">Louis · motorista de aplicativo<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"dim\">\n        <div class=\"dim-num\">Dimensão 03<\u002Fdiv>\n        <h3>Vivendo no agora.<\u002Fh3>\n        <p>\n          Sem perspectiva de futuro, sem capacidade de planejar. O presente\n          toma 99% da cabeça. Pensar à frente exige uma segurança que essas\n          pessoas já não têm.\n        <\u002Fp>\n        <div class=\"dim-voice\">\n          \"Minha preocupação com a dívida consome 99% do meu tempo. De\n          manhã, à noite, nos sonhos. Não tem outro pensamento.\"\n          <span class=\"dim-source\">Sandra · aposentada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"dim\">\n        <div class=\"dim-num\">Dimensão 04<\u002Fdiv>\n        <h3>Subsistência ameaçada.<\u002Fh3>\n        <p>\n          O consumo vira sobrevivência. Cortam-se lazer, cultura, saúde,\n          alimentação. Perde-se acesso a crédito justamente quando ele\n          seria necessário para emergências reais.\n        <\u002Fp>\n        <div class=\"dim-voice\">\n          \"Não tenho dinheiro nem pra comprar um óculos. Meu dente está\n          quebrado. Eu vivo pra pagar conta.\"\n          <span class=\"dim-source\">Mary · auxiliar de enfermagem<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 07 — RUST · ARMADILHA === -->\n<section class=\"section-rust\" id=\"responsabilizacao\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">07 · Crítica estrutural<\u002Fspan>\n      <h2 class=\"section-title\" style=\"color:var(--bone);\">A armadilha da responsabilização individual.<\u002Fh2>\n      <p class=\"section-intro\">\n        Esta é, talvez, a contribuição mais importante do estudo para quem\n        desenha políticas públicas e programas de inclusão financeira.\n      <\u002Fp>\n\n      <p class=\"body\">\n        A cultura do consumidor responsável funciona em duas direções ao\n        mesmo tempo. <strong>Quando dá certo<\u002Fstrong>, ela autoriza o\n        consumidor a tomar risco como agente autônomo.\n        <strong>Quando dá errado<\u002Fstrong>, ela transfere para esse mesmo\n        consumidor toda a responsabilidade pelo desastre — incluindo o\n        fracasso moral.\n      <\u002Fp>\n\n      <p class=\"body\">\n        O resultado é cruel: a pessoa que mais precisa de ajuda é a que\n        sente mais vergonha de pedir, porque internalizou que falhou. E\n        credores, reguladores e estado, que também participam da produção\n        do problema, ficam fora do enquadramento.\n      <\u002Fp>\n\n      <div class=\"synthesis\">\n        <div class=\"synthesis-label\">Síntese<\u002Fdiv>\n        <p>\n          Ansiedade não é uma base sólida para ação racional. Pedir que o\n          consumidor em caos exerça \"responsabilidade pessoal\" é exigir\n          exatamente aquilo que o caos retirou dele.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <p class=\"body\">\n        Programas que dependem do esforço individual ativo — fazer\n        orçamento, controlar impulsos, monitorar gastos diariamente —\n        falham justamente com quem mais precisa deles. O desenho que\n        funciona é o que <strong>reduz a carga cognitiva<\u002Fstrong> e\n        <strong>multiplica os pontos de apoio externos<\u002Fstrong> em vez de\n        exigir mais do indivíduo.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 08 — RECOMENDAÇÕES === -->\n<section class=\"section-bone\" id=\"recomendacoes\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">08 · Implementação<\u002Fspan>\n      <h2 class=\"section-title\">Seis problemas observados,<br>seis respostas possíveis.<\u002Fh2>\n      <p class=\"section-intro\">\n        A tabela adapta as recomendações do artigo original para projetos\n        de inclusão, educação e planejamento financeiro. À esquerda, o\n        problema que a pesquisa observou; à direita, a resposta de desenho\n        que decorre dele.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"recs\">\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Crédito usado para cobrir necessidades básicas ou complementar renda insuficiente.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Distinguir crédito de investimento de crédito de subsistência. Priorizar redes de proteção social — não educação financeira.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Tentativa de resolver a dívida sozinho por causa do estigma.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Canais de ajuda com baixo custo psicológico de admissão. Linguagem sem julgamento, acolhimento antes de diagnóstico, anonimato.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Aceitação de riscos não compreendidos por ilusão de controle.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Educação preventiva no estágio de Ordem. No Entremeio e no Caos, educação é insuficiente — é preciso renegociação institucional.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Exposição a perda de renda e despesas imprevistas sem reserva.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Mecanismos de poupança automática e seguros de baixo custo embutidos em produtos populares — não dependentes de disciplina mensal.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Espancamento emocional retira a capacidade de resposta.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Apoio psicológico como pré-requisito da intervenção financeira — não como complemento opcional.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rec\">\n        <div>\n          <span class=\"rec-col-label\">Problema observado<\u002Fspan>\n          <p class=\"rec-problem\">Riscos complexos e compostos superam a capacidade individual.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span class=\"rec-col-label\">Resposta de desenho<\u002Fspan>\n          <p class=\"rec-response\">Triagem multidisciplinar em três frentes: orientação financeira, amparo jurídico, suporte psicológico. Programas com só uma falham.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 09 — SINAIS DE ALERTA === -->\n<section class=\"section-bone\" id=\"sinais\" style=\"padding-top:2rem;\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">09 · Para quem atende<\u002Fspan>\n      <h2 class=\"section-title\">Seis sinais de que alguém está saindo da ordem.<\u002Fh2>\n      <p class=\"section-intro\">\n        Para educadores, conselheiros, assistentes sociais e agentes\n        comunitários que trabalham com famílias — pequenos sinais que\n        indicam que a pessoa pode estar transitando para o estágio de\n        Entremeio. São oportunidades de intervenção precoce.\n      <\u002Fp>\n\n      <div class=\"signals\">\n        <div class=\"signal\">\n          <div class=\"signal-num\">01<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>Refinanciamento recorrente.<\u002Fstrong> Quando a pessoa\n            relata trocar uma dívida por outra ou renegociar com extensão\n            de prazo mais de uma vez no ano.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signal\">\n          <div class=\"signal-num\">02<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>Isolamento crescente.<\u002Fstrong> Família ou amigos\n            relatam que a pessoa \"sumiu\", evita reuniões, não atende\n            telefone — especialmente em horário comercial.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signal\">\n          <div class=\"signal-num\">03<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>Vergonha ao falar de dinheiro.<\u002Fstrong> Mudança de\n            assunto, evasivas, frases como \"tá tudo bem\" desconectadas de\n            outros sinais de tensão visível.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signal\">\n          <div class=\"signal-num\">04<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>Cortes silenciosos.<\u002Fstrong> Cancelamento de plano de\n            saúde, atraso em medicamento contínuo, redução súbita em\n            consumo básico sem motivo declarado.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signal\">\n          <div class=\"signal-num\">05<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>Insônia, irritabilidade, sintomas físicos.<\u002Fstrong>\n            Sintomas clássicos de ansiedade crônica que aparecem antes da\n            pessoa nomear o problema financeiro.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signal\">\n          <div class=\"signal-num\">06<\u002Fdiv>\n          <div class=\"signal-text\">\n            <strong>\"Eu dou conta\".<\u002Fstrong> A frase mais perigosa. Aparece\n            quando a pessoa ainda está na ilusão de controle e bloqueia a\n            oferta de ajuda externa. Vale insistir, sem pressionar.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === CLOSING SECTION === -->\n<section class=\"section-forest\" id=\"fechamento\">\n  <div class=\"wrap\">\n    <div class=\"col closing\">\n      <span class=\"section-tag\">Para fechar<\u002Fspan>\n      <p class=\"closing-quote\">\n        \"A pessoa imersa no caos é tomada pelo presente e pelo imediato.\"\n      <\u002Fp>\n      <div class=\"closing-source\">\n        Arthur Frank · Just Listening: Narrative and Deep Illness · 1998\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === SECTION 10 — APÊNDICE / TEMPLATE === -->\n<section class=\"section-bone\" id=\"apendice\">\n  <div class=\"wrap\">\n    <div class=\"col\">\n      <span class=\"section-tag\">10 · Apêndice<\u002Fspan>\n      <h2 class=\"section-title\">O material-fonte,<br>como nos chegou.<\u002Fh2>\n      <p class=\"section-intro\">\n        Este briefing nasceu de um template enviado pelo próprio pesquisador.\n        Reproduzimos aqui o conteúdo na íntegra — síntese da pesquisa, perfil\n        do autor, entrevista, e os artigos que compõem a agenda — para que\n        cada leitor possa, se quiser, voltar à fonte.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"col\">\n      <div class=\"tpl-cover\">\n        <div class=\"tpl-cover-eyebrow\">Template para envio da pesquisa<\u002Fdiv>\n        <div class=\"tpl-cover-title\">From Order to Chaos<\u002Fdiv>\n        <p class=\"tpl-cover-ref\">\n          <em>How Consumers Lose Control of Risks (and of Themselves)<\u002Fem><br>\n          Julio C. Leandro · Delane Botelho<br>\n          <span style=\"opacity:0.7;\">Journal of Consumer Research<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- bloco 1 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 01 · Frase de entrada<\u002Fspan>\n        <blockquote class=\"entrada\">\n          O problema do superendividamento não é apenas a dívida — pode ser\n          a perda progressiva de controle sobre a própria vida.\n        <\u002Fblockquote>\n      <\u002Fdiv>\n\n      <!-- bloco 2 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 02 · A pesquisa<\u002Fspan>\n        <h3 class=\"bloco-title\">Um processo, não um erro.<\u002Fh3>\n\n        <p class=\"body\">\n          A forma mais comum de entender o superendividamento é simples: a\n          pessoa gastou demais ou tomou decisões ruins. Mas nossa pesquisa\n          mostra algo diferente. O superendividamento não acontece de uma\n          vez — ele se constrói ao longo do tempo, como um processo.\n        <\u002Fp>\n\n        <p class=\"body\">\n          Na maioria dos casos, tudo começa de forma legítima: usar crédito\n          para pagar contas, lidar com imprevistos ou manter o padrão de\n          vida. O problema é que, ao longo do tempo, diferentes eventos\n          começam a se acumular — perda de renda, problemas de saúde,\n          mudanças familiares, gastos inesperados. Para lidar com isso, as\n          pessoas recorrem a mais crédito, renegociam dívidas e tentam\n          resolver tudo sozinhas. Nesse processo, dois fatores são\n          decisivos: a ilusão de que ainda estão no controle e o medo de\n          admitir o problema. Aos poucos, as dívidas deixam de ser\n          administráveis e passam a crescer de forma desordenada. Quando a\n          pessoa percebe, já está em uma situação em que não consegue mais\n          controlar o que acontece. Nesse estágio, o problema deixa de ser\n          apenas financeiro. Ele afeta a saúde mental, as relações pessoais\n          e a forma como a pessoa se vê. Muitos relatam vergonha, isolamento,\n          ansiedade constante e a sensação de que perderam o controle da\n          própria vida.\n        <\u002Fp>\n\n        <p class=\"body\">\n          O que nossa pesquisa mostra é que o superendividamento não é\n          apenas um erro individual — é um processo complexo, marcado por\n          eventos inesperados, decisões difíceis e um ambiente que facilita\n          o acúmulo de riscos.\n        <\u002Fp>\n\n        <div class=\"imagery\">\n          <div class=\"imagery-card\">\n            <span class=\"rec-col-label\">Imagem · existente?<\u002Fspan>\n            <p>Pergunta no template: tem alguma imagem que compila as informações?<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"imagery-card\">\n            <span class=\"rec-col-label\">Imagem · imaginada<\u002Fspan>\n            <p>Mesmo que a imagem não exista, como ela poderia ser?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- bloco 3 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 03 · O pesquisador<\u002Fspan>\n        <h3 class=\"bloco-title\">Julio C. Leandro.<\u002Fh3>\n\n        <div class=\"bio-card\">\n          <p class=\"body\">\n            Sou doutor em Marketing pela FGV EAESP e fui pesquisador\n            visitante na University of Melbourne. Atuei como professor na\n            Universidade Presbiteriana Mackenzie (Brasil) e fui recentemente\n            contratado como professor na NEOMA Business School (França),\n            onde iniciarei minhas atividades em agosto.\n          <\u002Fp>\n          <p class=\"body\">\n            Minha pesquisa parte de problemas reais vividos pelos\n            consumidores, especialmente em temas como crédito, endividamento\n            e vulnerabilidade financeira. Busco entender como decisões\n            financeiras moldam a vida cotidiana, indo além do aspecto\n            econômico para explorar também suas dimensões emocionais,\n            simbólicas e relacionais. Meus trabalhos foram publicados no\n            Journal of Consumer Research, Journal of Business Research e\n            International Journal of Consumer Studies.\n          <\u002Fp>\n          <p class=\"body\">\n            Meu objetivo é produzir pesquisas que, além de rigor acadêmico,\n            sejam relevantes e capazes de gerar impacto positivo na vida\n            dos consumidores e na sociedade.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- bloco 4 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 04 · Entrevista<\u002Fspan>\n        <h3 class=\"bloco-title\">Cinco perguntas, cinco respostas.<\u002Fh3>\n\n        <div class=\"qa\">\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 01<\u002Fspan>\n            <p class=\"qa-q\">\n              Se você fosse chefe de um núcleo de pesquisa e tivesse 5\n              doutorandos ao seu dispor, quais rotas sugeriria a eles?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Se eu tivesse um núcleo de pesquisa com doutorandos, orientaria\n              o trabalho a partir de problemas reais vividos pelos\n              consumidores, e não apenas de questões abstratas ou\n              experimentais de laboratório.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Uma primeira linha seria entender, em profundidade, como\n              consumidores enfrentam desafios concretos no dia a dia,\n              especialmente em contextos de crédito, endividamento e\n              vulnerabilidade financeira. Isso implica sair do ambiente\n              controlado e ir a campo, ouvindo as pessoas e acompanhando\n              suas trajetórias. Também direcionaria parte das pesquisas\n              para temas específicos que hoje têm grande impacto sobre a\n              vida financeira dos brasileiros, como o crédito consignado,\n              os parcelamentos e o crescimento das apostas online. São\n              contextos em que o acesso ao crédito e ao consumo ocorre com\n              baixa fricção, mas com riscos muitas vezes subestimados.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Uma segunda frente seria investigar não apenas o comportamento\n              individual, mas também as falhas e limitações do próprio\n              sistema — incluindo o papel de instituições, produtos\n              financeiros e dinâmicas de mercado na geração desses problemas.\n              Além disso, incentivaria pesquisas que não se limitem à\n              explicação, mas que avancem para implicações práticas,\n              capazes de informar políticas públicas, regulação e decisões\n              de mercado. A ideia é produzir conhecimento que possa ser\n              efetivamente utilizado por quem toma decisões.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Por fim, estimularia o uso de dados ricos e abordagens\n              qualitativas profundas, como entrevistas e estudos de campo,\n              combinadas, sempre que possível, com outras metodologias. O\n              objetivo seria construir uma compreensão mais completa,\n              realista e útil dos fenômenos estudados.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 02<\u002Fspan>\n            <p class=\"qa-q\">\n              É muito provável que você almeje que seu trabalho impacte\n              positivamente a sociedade. Se você pudesse descrever seus\n              principais anseios e desejos relacionados a utilização da sua\n              pesquisa, quais seriam? Em quais instituições públicas e\n              privadas você sonha ver seu trabalho sendo utilizado como\n              referência? Em quais tipos de projetos?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              A principal ambição que tenho para a minha pesquisa é que ela\n              seja utilizada por reguladores e formuladores de políticas\n              públicas. Hoje, vejo o Brasil como um mercado ainda pouco\n              regulado em relação ao crédito e ao endividamento, especialmente\n              diante da complexidade e dos riscos que os consumidores\n              enfrentam no dia a dia. Acredito que uma melhor compreensão\n              de como o superendividamento se forma — como um processo\n              gradual de perda de controle, e não apenas como resultado de\n              decisões individuais — pode ajudar a orientar políticas mais\n              eficazes, com foco em prevenção, proteção e sustentabilidade\n              financeira.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Também gostaria que esse conhecimento fosse incorporado por\n              instituições financeiras e credores, contribuindo para\n              práticas de concessão de crédito mais responsáveis. Isso\n              envolve não apenas avaliar capacidade de pagamento, mas\n              também reconhecer os limites reais dos consumidores em\n              contextos de incerteza, estresse e vulnerabilidade. Além\n              disso, vejo um papel importante para todos aqueles que\n              interagem diretamente com consumidores — como planejadores\n              financeiros, educadores e organizações da sociedade civil.\n              Minha expectativa é que a pesquisa ajude esses atores a\n              compreender melhor a realidade das pessoas, indo além de\n              abordagens simplistas baseadas apenas em educação financeira,\n              e promovendo orientações mais realistas e eficazes.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              No fundo, o que busco é contribuir para um sistema mais\n              equilibrado, em que o crédito cumpra seu papel de inclusão e\n              desenvolvimento — e não de aprofundamento da vulnerabilidade.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 03<\u002Fspan>\n            <p class=\"qa-q\">\n              A jornada até aqui certamente envolveu altos e baixos.\n              Descreva como foi o dia mais feliz. Foi a entrega? A\n              apresentação? A aprovação? Um achado muito relevante?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Um dos momentos mais marcantes da minha trajetória foi a\n              conclusão do doutorado. Foi uma combinação de realização e\n              alívio — não apenas por terminar um ciclo longo e exigente,\n              mas por saber que eu havia construído um trabalho relevante,\n              que fazia sentido para mim e que estava conectado a problemas\n              reais. Ao longo desse percurso, outros momentos também foram\n              muito especiais. Ser aceito como pesquisador visitante na\n              University of Melbourne foi um reconhecimento importante,\n              assim como ver meu trabalho ganhar espaço em periódicos\n              internacionais. A publicação no Journal of Business Research\n              já foi uma grande conquista, mas a aceitação no Journal of\n              Consumer Research teve um significado ainda mais forte, por\n              ser uma das principais referências mundiais na área. Mais do\n              que marcos isolados, esses momentos representam a sensação\n              de que estou conseguindo construir uma agenda de pesquisa\n              consistente, com relevância acadêmica e, ao mesmo tempo,\n              potencial de impacto fora da universidade.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 04<\u002Fspan>\n            <p class=\"qa-q\">\n              Existiram pessoas ou projetos que se beneficiaram de maneira\n              direta da pesquisa produzida? Essas pessoas ou projetos\n              aceitariam conversar com a gente?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Acredito que o impacto da pesquisa ainda é, em grande parte,\n              indireto — o que é natural para um trabalho acadêmico. Mas\n              ele já começa a se materializar em alguns contextos. Durante\n              o desenvolvimento da pesquisa, tive contato direto com\n              consumidores em situação de superendividamento, especialmente\n              em programas de apoio e renegociação de dívidas. Esse contato\n              foi fundamental para compreender a profundidade do problema\n              e, ao mesmo tempo, já permitiu compartilhar algumas reflexões\n              com profissionais que atuam diretamente com esse público.\n              Vejo um grande potencial de aplicação prática para diferentes\n              atores: desde instituições públicas e programas de apoio ao\n              consumidor, até planejadores financeiros e profissionais que\n              lidam diariamente com pessoas endividadas. Acredito que\n              muitos desses profissionais se reconhecem nas situações\n              descritas pela pesquisa, mesmo que ainda não utilizem\n              formalmente seus conceitos. Meu interesse, daqui para frente,\n              é justamente aproximar mais esse conhecimento da prática —\n              criando pontes para que esses insights possam ser utilizados\n              de forma mais direta por quem atua na linha de frente do\n              problema.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 05<\u002Fspan>\n            <p class=\"qa-q\">\n              Se você pudesse contratar um especialista para produzir\n              materiais em alguma mídia (áudio, vídeo, infográfico), qual\n              seria o formato de sua preferência?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Tenho buscado levar minha pesquisa para além do ambiente\n              acadêmico por meio de artigos para a grande mídia,\n              especialmente sobre crédito e endividamento. O objetivo é\n              apresentar novos olhares sobre o problema, que não se limitem\n              à culpabilização do consumidor, mas considerem também os\n              fatores estruturais e o funcionamento do sistema. Esses\n              textos já têm sido pensados como uma forma de influenciar o\n              debate público e, potencialmente, contribuir para discussões\n              regulatórias mais informadas.\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Se pudesse expandir esse trabalho com apoio especializado,\n              gostaria de desenvolver materiais mais acessíveis e adaptados\n              a diferentes formatos — especialmente para redes sociais.\n              Vejo muito valor em conteúdos curtos, visuais e diretos, que\n              consigam traduzir ideias mais complexas de forma simples,\n              sem perder profundidade. Também me interessaria explorar\n              formatos como vídeos curtos e infográficos, que ajudem a\n              explicar, por exemplo, como o endividamento se constrói ao\n              longo do tempo ou como determinadas práticas de mercado\n              impactam o consumidor. A ideia seria ampliar o alcance da\n              pesquisa e torná-la mais útil para diferentes públicos,\n              mantendo o compromisso com a qualidade e a fidelidade às\n              evidências.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"qa-item\">\n            <span class=\"qa-q-label\">Pergunta 06<\u002Fspan>\n            <p class=\"qa-q\">\n              Durante o processo de pesquisa, você teve algum insight mais\n              específico ou acesso a alguma bibliografia que gostaria de\n              compartilhar?\n            <\u002Fp>\n            <p class=\"qa-a\">\n              Um dos principais insights da pesquisa é que o superendividamento\n              não surge de um único erro, mas da combinação de diferentes\n              fragilidades que se acumulam ao longo do tempo. Em muitos\n              casos, tudo começa com o uso do crédito para cobrir\n              necessidades básicas ou compensar uma renda insuficiente —\n              ou seja, a vulnerabilidade já está presente desde o início.\n              Ao longo do processo, diversos fatores agravam a situação:\n              o medo e a vergonha levam muitas pessoas a tentarem resolver\n              o problema sozinhas; a sensação de ainda estar no controle\n              faz com que decisões de risco continuem sendo tomadas; e\n              eventos inesperados, como perda de renda ou despesas\n              emergenciais, aumentam ainda mais a pressão. Com o tempo, o\n              problema deixa de ser apenas financeiro. As pessoas passam a\n              lidar com estresse constante, ansiedade e um sentimento de\n              desorganização da própria vida, o que dificulta ainda mais\n              qualquer tentativa de reação. O que a pesquisa mostra é que\n              os consumidores enfrentam esse processo com recursos\n              limitados — seja em termos de informação, planejamento ou\n              apoio emocional — e acabam expostos a riscos que são\n              complexos, imprevisíveis e difíceis de gerenciar. Esse\n              conjunto de fatores ajuda a explicar por que o\n              superendividamento não pode ser entendido apenas como falha\n              individual, mas como um fenômeno mais amplo, que envolve\n              também o contexto em que essas decisões são tomadas.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- bloco 5 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 05 · O observatório como ponte<\u002Fspan>\n        <h3 class=\"bloco-title\">Da academia para a prática.<\u002Fh3>\n\n        <p class=\"body\">\n          Tenho interesse em construir pontes que levem a pesquisa para\n          além do ambiente acadêmico, especialmente conectando pesquisadores\n          com formuladores de políticas públicas, reguladores, instituições\n          financeiras e profissionais que atuam diretamente com consumidores.\n          Acredito que minha pesquisa pode contribuir para uma compreensão\n          mais ampla e realista dos problemas enfrentados pelos consumidores,\n          especialmente em contextos de endividamento e vulnerabilidade\n          financeira. Meu objetivo é que esses insights ajudem a orientar\n          decisões mais informadas — tanto no desenho de políticas públicas\n          quanto na regulação do crédito e no desenvolvimento de práticas\n          mais responsáveis por parte das instituições.\n        <\u002Fp>\n\n        <p class=\"body\">\n          Também me interessa dialogar com planejadores financeiros,\n          organizações da sociedade civil e projetos locais que atuam\n          diretamente com consumidores, para que a pesquisa possa ser\n          traduzida em soluções práticas, mais sensíveis à realidade das\n          pessoas. No fundo, o que busco é contribuir para um ecossistema\n          em que diferentes atores — governo, mercado e sociedade —\n          consigam atuar de forma mais coordenada, promovendo decisões\n          financeiras mais sustentáveis e reduzindo situações de\n          vulnerabilidade.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- bloco 6 -->\n      <div class=\"bloco\">\n        <span class=\"bloco-label\">Bloco 06 · Links importantes<\u002Fspan>\n        <h3 class=\"bloco-title\">Dois artigos, uma agenda.<\u002Fh3>\n\n        <p class=\"body\">\n          Estou compartilhando em anexo dois artigos que representam o\n          núcleo da minha agenda de pesquisa sobre crédito, endividamento\n          e vulnerabilidade financeira:\n        <\u002Fp>\n\n        <ul class=\"linklist\">\n          <li>\n            <span class=\"linklist-num\">01<\u002Fspan>\n            <div class=\"linklist-body\">\n              <em>From Order to Chaos: How Consumers Lose Control of Risks (and of Themselves)<\u002Fem>,\n              de Julio C. Leandro e Delane Botelho.\n              <span class=\"pub\">Journal of Consumer Research · 2025<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fli>\n          <li>\n            <span class=\"linklist-num\">02<\u002Fspan>\n            <div class=\"linklist-body\">\n              <em>Consumer Over-Indebtedness: A Review and Future Research Agenda<\u002Fem>,\n              de Julio C. Leandro e Delane Botelho.\n              <span class=\"pub\">Journal of Business Research<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fli>\n        <\u002Ful>\n\n        <p class=\"body\" style=\"margin-top:2rem;\">\n          Acredito que esses trabalhos podem contribuir para uma compreensão\n          mais aprofundada dos desafios enfrentados pelos consumidores e\n          apoiar reflexões voltadas a políticas públicas, regulação e\n          práticas de mercado mais responsáveis.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- === FOOTER === -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer-grid\">\n      <div class=\"footer-brand\">\n        <a href=\"#top\" class=\"brand\" style=\"color:var(--bone);\">\n          <svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n            <circle cx=\"50\" cy=\"50\" r=\"28\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><\u002Fcircle>\n            <circle cx=\"56\" cy=\"42\" r=\"6\" fill=\"#D96B3D\"><\u002Fcircle>\n            <path d=\"M 14 64 C 30 63, 50 65, 86 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n          <span class=\"brand-name\">observatório<span class=\"dot\">.<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <div class=\"footer-tagline\">\n          <span class=\"b\">ciências comportamentais<\u002Fspan> aplicadas à\n          inclusão, educação e planejamento financeiro no\n          <span class=\"b\">sul global<\u002Fspan>.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"footer-ref-label\">Referência<\u002Fdiv>\n        <p class=\"footer-ref\">\n          Este briefing traduz, para fins de implementação prática, o\n          artigo <em>From Order to Chaos: How Consumers Lose Control of\n          Risks (and of Themselves)<\u002Fem>, de Júlio C. Leandro e Delane\n          Botelho, publicado no <em>Journal of Consumer Research<\u002Fem>,\n          vol. 52, n. 6, abril de 2025\n          (<a href=\"https://doi.org/10.1093/jcr/ucaf026\" target=\"_blank\" rel=\"noopener\">doi: 10.1093/jcr/ucaf026<\u002Fa>).\n          A pesquisa original entrevistou 37 consumidores superendividados\n          em São Paulo, além de conselheiros do ProConsumer e participantes\n          do Devedores Anônimos. Recomendamos a leitura integral para quem\n          for desenhar políticas baseadas neste enquadramento.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"footer-bottom\">\n      <span>© Observatório · 2026 · Briefing 04<\u002Fspan>\n      <span>Tradução de pesquisa · Sul Global<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- === BACK TO TOP === -->\n<a href=\"#top\" class=\"totop\" id=\"totop\" aria-label=\"Voltar ao topo\">↑<\u002Fa>\n\n<script>\n  // Reading progress bar\n  const progress = document.getElementById('progress');\n  const totop = document.getElementById('totop');\n\n  function onScroll() {\n    const h = document.documentElement;\n    const scrollTop = h.scrollTop || document.body.scrollTop;\n    const scrollHeight = h.scrollHeight - h.clientHeight;\n    const pct = (scrollTop / scrollHeight) * 100;\n    progress.style.width = pct + '%';\n\n    if (scrollTop > 600) {\n      totop.classList.add('visible');\n    } else {\n      totop.classList.remove('visible');\n    }\n  }\n\n  window.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n<\u002Fscript>\n\n\n\n\n<style id=\"__om-edit-overrides\">\n#top :is(h1,h2,h3,h4,h5,h6) >:is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) >b { font-family: \"Playfair Display\" !important }\n#top :is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) >div:nth-child(1) { font-size: 42.4px !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
