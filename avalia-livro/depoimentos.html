<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depoimentos - Dinheiro Sem Medo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300;400;700&family=Roboto+Condensed:wght@400;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='15' width='60' height='70' rx='3' fill='%2334A853'/%3E%3Crect x='25' y='20' width='50' height='60' rx='2' fill='%2346B968'/%3E%3Cpath d='M50 20 L50 80' stroke='%232D8E44' stroke-width='2'/%3E%3Cpath d='M50 30 L70 30' stroke='%23ffffff' stroke-width='1.5' opacity='0.6'/%3E%3Cpath d='M50 40 L70 40' stroke='%23ffffff' stroke-width='1.5' opacity='0.6'/%3E%3Cpath d='M50 50 L70 50' stroke='%23ffffff' stroke-width='1.5' opacity='0.6'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            font-size: 19px;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
        }

        /* Seção de Fotos */
        .fotos-section {
            padding: 0;
            width: 100%;
            position: relative;
            overflow: visible;
        }

        .fotos-section .bg-abstract {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140%;
            z-index: 0;
            overflow: visible;
        }

        .fotos-section .bg-abstract svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .fotos-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        .foto-item {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 8px;
        }

        .foto-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .foto-item img:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        /* Modal de Foto */
        .foto-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(128, 128, 128, 0.85);
            align-items: center;
            justify-content: center;
        }

        .foto-modal.active {
            display: flex;
        }

        .foto-modal-content {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .foto-modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .foto-modal-close:hover {
            color: #ccc;
        }

        /* Frase Impactante */
        .frase-section {
            padding: 60px 0;
            text-align: center;
            position: relative;
            background: transparent;
        }

        .frase-section-1 {
            padding-top: 75px;
            padding-bottom: 40px;
        }

        .frase-impactante-1 {
            font-family: 'Averia Serif Libre', serif;
            font-size: 75px;
            font-weight: 300;
            line-height: 1.2;
            color: #000;
            max-width: 70%;
            margin: 0 auto;
        }

        .br-desktop {
            display: none;
        }

        @media (min-width: 1920px) {
            .br-desktop {
                display: inline;
            }
        }

        /* Seção de Depoimentos */
        .depoimentos-section {
            padding: 20px 0 80px 0;
        }

        .depoimentos-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Depoimentos em Destaque */
        .depoimentos-destaque {
            margin-bottom: 60px;
        }

        .destaque-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .depoimento-card {
            background-color: #d4e8e3;
            border-radius: 8px;
            padding: 28px;
            display: flex;
            flex-direction: column;
        }

        .depoimento-card.destaque {
            background-color: #e8f4f1;
            border: 2px solid #c5ddd7;
        }

        .depoimento-stars {
            color: #f0b429;
            font-size: 22px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .depoimento-stars .star-empty {
            color: #a8c9c1;
        }

        .depoimento-texto {
            font-size: 16px;
            line-height: 1.7;
            color: #444;
            flex: 1;
            margin-bottom: 16px;
        }

        .depoimento-card.destaque .depoimento-texto {
            font-size: 17px;
        }

        .depoimento-autor {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #000;
        }

        /* Grid de Depoimentos Normal */
        .depoimentos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .depoimentos-grid .depoimento-card {
            padding: 22px;
        }

        .depoimentos-grid .depoimento-stars {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .depoimentos-grid .depoimento-texto {
            font-size: 14px;
            line-height: 1.6;
        }

        .depoimentos-grid .depoimento-autor {
            font-size: 13px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #d4e8e3;
            border-radius: 50%;
            border-top-color: #8FB3A9;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Seção Fale Comigo */
        .contact-section {
            padding: 65px 0 65px 0;
            background-color: #8FB3A9;
            position: relative;
        }

        .contact-section .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0;
            margin-left: 15%;
        }

        .contact-title {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #3d4a47;
            margin-bottom: 20px;
        }

        .contact-text {
            font-size: 16px;
            line-height: 1.7;
            color: #3d4a47;
            max-width: 441px;
        }

        .contact-text p {
            margin-bottom: 1em;
        }

        .contact-text a {
            color: #3d4a47;
            text-decoration: none;
        }

        .contact-text a:hover {
            text-decoration: underline;
        }

        .contact-logo {
            display: block;
            margin-top: 34px;
        }

        /* Responsivo */
        @media (max-width: 1200px) {
            .depoimentos-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1024px) {
            body {
                font-size: 17px;
            }

            .frase-impactante-1 {
                font-size: 60px;
            }

            .fotos-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 10px;
                padding: 10px;
            }

            .destaque-grid {
                grid-template-columns: 1fr;
            }

            .depoimentos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .frase-section {
                padding: 45px 0 36px 0;
            }

            .frase-section-1 {
                padding-top: 94px;
            }

            .frase-impactante-1 {
                font-size: 41px;
                padding: 0 20px;
                width: 100%;
                max-width: 100%;
            }

            .fotos-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .depoimentos-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .destaque-grid {
                gap: 20px;
            }

            .contact-section .container {
                margin-left: 0;
                margin-right: 0;
                padding: 0 20px;
            }

            .contact-title {
                font-size: 38px;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 16px;
            }

            .frase-impactante-1 {
                font-size: 27px;
            }

            .depoimento-card {
                padding: 20px;
            }

            .contact-section .container {
                margin-left: 5%;
                max-width: 90%;
            }

            .contact-title {
                font-size: 28px;
            }

            .contact-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Seção de Fotos (12 fotos) -->
    <section class="fotos-section">
        <div class="bg-abstract">
            <svg viewBox="0 0 1440 700" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Camada base -->
                <path fill="#F7EBE3" d="M0,0 L1440,0 L1440,500 Q1200,620 720,540 Q240,460 0,580 L0,0 Z"/>
                <!-- Camada intermediária com movimento -->
                <path fill="#EFE0D6" opacity="0.6" d="M0,0 L1440,0 L1440,450 Q1100,570 600,490 Q100,410 0,520 L0,0 Z"/>
                <!-- Camada de destaque -->
                <path fill="#FDF5F0" opacity="0.5" d="M0,0 L1440,0 L1440,400 Q1000,520 500,440 Q150,370 0,480 L0,0 Z"/>
                <!-- Formas orgânicas flutuantes -->
                <ellipse cx="200" cy="150" rx="180" ry="120" fill="#ffffff" opacity="0.4"/>
                <ellipse cx="1200" cy="200" rx="220" ry="140" fill="#ffffff" opacity="0.3"/>
                <ellipse cx="700" cy="100" rx="150" ry="100" fill="#ffffff" opacity="0.25"/>
                <circle cx="1350" cy="80" r="60" fill="#ffffff" opacity="0.35"/>
                <circle cx="100" cy="350" r="80" fill="#E8D5C9" opacity="0.4"/>
            </svg>
        </div>
        <div class="fotos-grid">
            <div class="foto-item">
                <img src="img-avalia/foto-1.jpg" alt="Dinheiro Sem Medo - Foto 1">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-2.jpg" alt="Dinheiro Sem Medo - Foto 2">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-3.jpg" alt="Dinheiro Sem Medo - Foto 3">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-4.jpg" alt="Dinheiro Sem Medo - Foto 4">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-5.jpg" alt="Dinheiro Sem Medo - Foto 5">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-6.jpg" alt="Dinheiro Sem Medo - Foto 6">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-7.jpg" alt="Dinheiro Sem Medo - Foto 7">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-8.jpg" alt="Dinheiro Sem Medo - Foto 8">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-9.jpg" alt="Dinheiro Sem Medo - Foto 9">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-10.jpg" alt="Dinheiro Sem Medo - Foto 10">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-11.jpg" alt="Dinheiro Sem Medo - Foto 11">
            </div>
            <div class="foto-item">
                <img src="img-avalia/foto-12.jpg" alt="Dinheiro Sem Medo - Foto 12">
            </div>
        </div>
    </section>

    <!-- Frase Impactante -->
    <section class="frase-section frase-section-1">
        <h1 class="frase-impactante-1">o que os leitores acharam <br class="br-desktop">do dinheiro sem medo?</h1>
    </section>

    <!-- Seção de Depoimentos -->
    <section class="depoimentos-section">
        <div class="depoimentos-container">
            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Carregando depoimentos...</p>
            </div>

            <!-- Depoimentos em Destaque -->
            <div class="depoimentos-destaque" id="depoimentosDestaque" style="display: none;">
                <div class="destaque-grid" id="destaqueGrid">
                    <!-- Depoimentos em destaque serão inseridos aqui -->
                </div>
            </div>

            <!-- Todos os Depoimentos -->
            <div class="depoimentos-grid" id="depoimentosGrid" style="display: none;">
                <!-- Depoimentos serão inseridos aqui -->
            </div>
        </div>
    </section>

    <!-- Fale Comigo -->
    <section class="contact-section">
        <div class="container">
            <h2 class="contact-title">oi!</h2>
            <div class="contact-text">
                <p>Se surgir qualquer dúvida, você pode falar comigo através do eduardo@amuri.com.br ou do <a href="https://wa.me/5511991631373" target="_blank" rel="noopener">11-991631373</a>, é meu número pessoal, será um prazer :)</p>
                <p>Um abraço grande!</p>
            </div>
            <img class="contact-logo" src="https://programas.amuri.com.br/wp-content/themes/amuri/public/images/lp-dsm/lp-dsm_amuri-logo.svg" width="120" height="30" alt="AMURI">
        </div>
    </section>

    <!-- Modal de Foto -->
    <div id="fotoModal" class="foto-modal">
        <span class="foto-modal-close">&times;</span>
        <img class="foto-modal-content" id="fotoModalImg" alt="Foto ampliada">
    </div>

    <script>
        // Modal de fotos
        const modal = document.getElementById('fotoModal');
        const modalImg = document.getElementById('fotoModalImg');
        const closeBtn = document.querySelector('.foto-modal-close');
        const fotoItems = document.querySelectorAll('.foto-item img');

        fotoItems.forEach(foto => {
            foto.addEventListener('click', function() {
                modal.classList.add('active');
                modalImg.src = this.src;
                modalImg.alt = this.alt;
            });
        });

        closeBtn.addEventListener('click', function() {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                modal.classList.remove('active');
            }
        });

        // Função para gerar estrelas
        function gerarEstrelas(rating) {
            const ratingNum = parseInt(rating) || 0;
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= ratingNum) {
                    stars += '★';
                } else {
                    stars += '<span class="star-empty">★</span>';
                }
            }
            return stars;
        }

        // Função para criar card de depoimento
        function criarDepoimentoCard(depoimento, isDestaque = false) {
            const card = document.createElement('div');
            card.className = 'depoimento-card' + (isDestaque ? ' destaque' : '');

            card.innerHTML = `
                <div class="depoimento-stars">${gerarEstrelas(depoimento.rating)}</div>
                <p class="depoimento-texto">${depoimento.testimonial}</p>
                <p class="depoimento-autor">${depoimento.name}</p>
            `;

            return card;
        }

        // Carregar depoimentos da planilha
        async function carregarDepoimentos() {
            const loading = document.getElementById('loading');
            const depoimentosDestaque = document.getElementById('depoimentosDestaque');
            const destaqueGrid = document.getElementById('destaqueGrid');
            const depoimentosGrid = document.getElementById('depoimentosGrid');

            try {
                // URL do Google Apps Script para leitura
                // Você precisará criar uma função doGet no Apps Script
                const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOQ6kx-EQ1LV_j62yGFQTSenKDGQg0ALwWgGeU6tcZkt0wyS8c7oxhhNUEIt1N65Uv/exec';

                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();

                if (data && data.length > 0) {
                    // Filtrar depoimentos ocultos e separar destaque e normais
                    const visiveis = data.filter(d => d.destaque !== 'n');
                    const destaques = visiveis.filter(d => d.destaque === '*');
                    const normais = visiveis.filter(d => d.destaque !== '*');

                    // Renderizar destaques
                    if (destaques.length > 0) {
                        destaques.forEach(dep => {
                            destaqueGrid.appendChild(criarDepoimentoCard(dep, true));
                        });
                        depoimentosDestaque.style.display = 'block';
                    }

                    // Renderizar normais
                    normais.forEach(dep => {
                        depoimentosGrid.appendChild(criarDepoimentoCard(dep, false));
                    });
                    depoimentosGrid.style.display = 'grid';
                }

                loading.style.display = 'none';

            } catch (error) {
                console.error('Erro ao carregar depoimentos:', error);
                loading.innerHTML = '<p>Não foi possível carregar os depoimentos no momento.</p>';
            }
        }

        // Carregar depoimentos ao iniciar
        carregarDepoimentos();
    </script>

</body>
</html>
