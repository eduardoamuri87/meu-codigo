app = 'amuri-money'
primary_region = 'gru'

[env]
  DATABASE_URL = 'file:/data/local.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'amuri_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
